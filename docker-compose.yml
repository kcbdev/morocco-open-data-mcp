# Morocco Open Data MCP Server - Docker Compose Configuration
# Provides easy deployment with environment variable management

version: '3.8'

services:
  # Main MCP Server
  morocco-open-data-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: morocco-open-data-mcp
    restart: unless-stopped

    # Environment variables
    environment:
      # Server Configuration
      - NODE_ENV=production
      - MCP_PORT=3000
      - MCP_HOST=0.0.0.0

      # Cache Configuration
      - CACHE_TTL_DEFAULT=3600
      - CACHE_TTL_SHORT=300
      - CACHE_TTL_LONG=86400

      # Rate Limiting
      - RATE_LIMIT_DEFAULT=60
      - RATE_LIMIT_STRICT=10

      # API Keys (set these in .env file or secrets manager)
      - BAM_KEY_CHANGES=${BAM_KEY_CHANGES:-}
      - BAM_KEY_OBLIGATIONS=${BAM_KEY_OBLIGATIONS:-}
      - BAM_KEY_TBILLS=${BAM_KEY_TBILLS:-}
      - WORLD_BANK_API_KEY=${WORLD_BANK_API_KEY:-}
      - ACLED_API_KEY=${ACLED_API_KEY:-}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    # Logging configuration
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('MCP server healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Network configuration
    networks:
      - mcp-network

    # Volumes for persistence (optional)
    volumes:
      # Mount .env file for environment variables
      - ./.env:/app/.env:ro
      # Persistent cache (if using file-based cache)
      - mcp-cache:/app/cache

  # Optional: Redis for distributed caching (uncomment if needed)
  # redis:
  #   image: redis:7-alpine
  #   container_name: morocco-mcp-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - mcp-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

  # Optional: Sync job runner (for nightly knowledge graph builds)
  # sync-runner:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: production
  #   container_name: morocco-mcp-sync
  #   restart: "no"
  #   command: ["node", "dist/sync/graphSync.js"]
  #   environment:
  #     - NODE_ENV=production
  #     - BAM_KEY_CHANGES=${BAM_KEY_CHANGES:-}
  #     - BAM_KEY_OBLIGATIONS=${BAM_KEY_OBLIGATIONS:-}
  #     - BAM_KEY_TBILLS=${BAM_KEY_TBILLS:-}
  #     - WORLD_BANK_API_KEY=${WORLD_BANK_API_KEY:-}
  #   networks:
  #     - mcp-network
  #   depends_on:
  #     - morocco-open-data-mcp
  #     - redis
  #   # Schedule with cron or external scheduler
  #   # docker run --rm morocco-mcp-sync

# Networks
networks:
  mcp-network:
    driver: bridge
    name: morocco-mcp-network

# Volumes
volumes:
  mcp-cache:
    name: morocco-mcp-cache
  # redis-data:
  #   name: morocco-mcp-redis-data

# ============================
# Usage Instructions
# ============================
#
# Build and start:
#   docker-compose up -d --build
#
# View logs:
#   docker-compose logs -f
#
# Stop:
#   docker-compose down
#
# Restart:
#   docker-compose restart
#
# Update and redeploy:
#   docker-compose pull
#   docker-compose up -d --build
#
# Run with custom .env:
#   docker-compose --env-file .env.production up -d
#
# Scale (if using HTTP transport):
#   docker-compose up -d --scale morocco-open-data-mcp=3
#
# Run sync job manually:
#   docker-compose run --rm sync-runner
#
# ============================
# Environment Variables
# ============================
# Create a .env file with:
#
# BAM_KEY_CHANGES=your_key_here
# BAM_KEY_OBLIGATIONS=your_key_here
# BAM_KEY_TBILLS=your_key_here
# WORLD_BANK_API_KEY=your_key_here
# ACLED_API_KEY=your_key_here
# OPENWEATHER_API_KEY=your_key_here
# ANTHROPIC_API_KEY=your_key_here
